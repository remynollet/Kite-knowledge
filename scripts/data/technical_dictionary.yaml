# Technical Dictionary for Kite-knowledge (i18n)
# Used by translation scripts and glossary generation to ensure terminological precision.
# Source of truth for translations of specific technical kite terms.

terms:
  - id: bridle
    fr: bridage
    en: bridle
    de: Waage
    it: briglia
    es: brida
    description_fr: "Ensemble de lignes reliant le cerf-volant au fil de retenue, permettant de régler son angle d'attaque."
    description_en: "A system of lines connecting the kite to the flying line, used to control the angle of attack."

  - id: spar
    fr: vergue
    en: spar
    de: Spreize
    it: traversa
    es: travesaño
    description_fr: "Élément rigide de l'armature (en carbone, fibre de verre ou bois) qui maintient la voile tendue."
    description_en: "A rigid element of the frame (made of carbon, fiberglass, or wood) that keeps the sail taut."

  - id: sail
    fr: voile
    en: sail
    de: Segel
    it: vela
    es: vela
    description_fr: "La partie souple du cerf-volant qui capture le vent pour générer de la portance."
    description_en: "The flexible part of the kite that captures the wind to generate lift."

  - id: lift
    fr: portance
    en: lift
    de: Auftrieb
    it: portanza
    es: sustentación
    description_fr: "La force aérodynamique qui permet au cerf-volant de s'élever et de se maintenir en l'air."
    description_en: "The aerodynamic force that allows the kite to rise and stay aloft."

  - id: leading-edge
    fr: bord d'attaque
    en: leading edge
    de: Leitkante
    it: bordo d'attacco
    es: borde de ataque
    description_fr: "Le bord avant de la voile qui rencontre le vent en premier."
    description_en: "The front edge of the sail that meets the wind first."

  - id: trailing-edge
    fr: bord de fuite
    en: trailing edge
    de: Schleppkante
    it: bordo d'uscita
    es: borde de fuga
    description_fr: "Le bord arrière de la voile où le vent s'échappe."
    description_en: "The rear edge of the sail where the wind flows off."

  - id: spine
    fr: quille
    en: spine
    de: Kiel
    it: chiglia
    es: quilla
    description_fr: "Élément central de l'armature qui court de haut en bas le long de l'axe de symétrie."
    description_en: "The central element of the frame running vertically along the axis of symmetry."

  - id: wingspan
    fr: envergure
    en: wingspan
    de: Spannweite
    it: apertura alare
    es: envergadura
    description_fr: "La distance entre les deux extrémités latérales des ailes du cerf-volant."
    description_en: "The distance from the tip of one wing to the tip of the other."

  - id: vented
    fr: ventilé
    en: vented
    de: ventiliert
    it: ventilato
    es: ventilado
    description_fr: "Modèle dont la voile comporte des ouvertures (évents) pour réduire la pression du vent fort."
    description_en: "A kite model with openings (vents) in the sail to reduce pressure in high winds."

  - id: bridle-adjustment
    fr: réglage de bridage
    en: bridle adjustment
    de: Waageeinstellung
    it: regolazione della briglia
    es: ajuste de brida
    description_fr: "Modification de la longueur des lignes du bridage pour adapter le vol aux conditions de vent."
    description_en: "Changing the length of bridle lines to adapt the flight to wind conditions."
