# Schema for entity type: pilot
type: pilot
fields:
  id:
    type: string
    required: true
    description: "Kebab-case slug matching the filename exactly."
    notes: "No accents, no spaces, no uppercase. Must equal filename without .md extension."
  type:
    type: string
    required: true
    allowed_values: [pilot]
    description: "Fixed value: pilot"
  title:
    type: string
    required: true
    description: "Pilot full name."
    notes: "pilot is distinct from person — used for competitive or recognized names in sport context."
  date_range:
    type: string
    required: true
    description: "Active competition years. E.g., '1995-present' or '1988-2010'."
  geography:
    type: string
    required: true
    description: "Country or region of nationality/competition base."
  category:
    type: string
    required: true
    description: "Pilot discipline: sport, power, traction, display, indoor, ballet, etc."
  tags:
    type: list
    required: true
    description: "At least one tag must match type 'pilot'. Additional domain tags welcome."
  related:
    type: list
    required: true
    description: "Relative paths to related docs/ entities. May be empty list []."
  summary:
    type: string
    required: true
    description: "One-sentence summary shown in EntityHeader component."
  ai_status:
    type: string
    required: true
    allowed_values: [draft, in-review, validated]
    description: "Editorial lifecycle state."
  source_verified:
    type: bool
    required: true
    description: "True only when all sources have been checked by a human reviewer."
  reviewer:
    type: string
    required: false
    description: "GitHub username of reviewer. Null until reviewed."
    notes: "Must not be null in docs/ (enforced by validate_frontmatter.py extended checks)."
  review_date:
    type: string
    required: false
    description: "ISO date YYYY-MM-DD of last review. Null until reviewed."
