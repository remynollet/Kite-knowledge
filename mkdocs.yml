site_name: Kite-knowledge
site_url: https://remynollet.github.io/kite-knowledge/
site_description: A structured, source-aware knowledge base covering kite history
  and technical evolution from 1850 to the present.
repo_url: https://github.com/remynollet/Kite-knowledge
repo_name: remynollet/Kite-knowledge
docs_dir: docs
theme:
  name: material
  custom_dir: overrides
  palette:
  - scheme: default
    primary: indigo
    accent: amber
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: amber
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - navigation.breadcrumbs
  - toc.integrate
  - search.highlight
  - search.suggest
  - search.share
  - i18n.language_switcher
extra_css:
- stylesheets/theme.css
- stylesheets/entity-header.css
- stylesheets/key-facts-block.css
- stylesheets/related-entities.css
- stylesheets/badges.css
- stylesheets/archive-panel.css
- stylesheets/timeline.css
- stylesheets/timeline-interactive.css
- stylesheets/pinterest.css
- stylesheets/responsive.css
- stylesheets/recovery-path-bar.css
- stylesheets/source-citation-panel.css
- stylesheets/amendment.css
- stylesheets/contributors.css
- stylesheets/ai-content-warning.css
- stylesheets/graph-explorer.css

plugins:

- i18n:
    languages:
    - locale: fr
      name: Français
      default: true
    - locale: en
      name: English
    - locale: de
      name: Deutsch
    - locale: it
      name: Italiano
    - locale: es
      name: Español
- search:
    lang:
    - fr
    - en
    - de
    - it
    - es
- tags
markdown_extensions:
- toc:
    permalink: true
- admonition
- attr_list
- md_in_html
